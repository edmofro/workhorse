<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workhorse — Spec Review</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,450;14..32,500;14..32,600;14..32,700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #f8f7f4; --surface: #ffffff; --sidebar-bg: #f1efeb;
    --hover: #edeae5; --inset: #e8e5df;
    --border: #dfdcd5; --border-light: #eae7e1;
    --text: #1c1917; --text-2: #57534e; --text-3: #a8a29e; --text-4: #d1cdc6;
    --accent: #c2410c; --green: #16a34a; --amber: #b45309; --blue: #2563eb;
    --shadow: 0 1px 3px rgba(28,25,23,0.04);
  }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 14px; line-height: 1.5; height: 100vh;
    display: flex; overflow: hidden; -webkit-font-smoothing: antialiased;
  }
  .sidebar {
    width: 216px; background: var(--sidebar-bg);
    border-right: 1px solid var(--border-light);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .sidebar-header { padding: 20px 16px 24px; display: flex; align-items: center; gap: 10px; }
  .logo {
    width: 26px; height: 26px; background: var(--accent); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; color: white;
  }
  .logo-text { font-weight: 700; font-size: 15px; letter-spacing: -0.03em; }
  .sidebar-nav { padding: 0 8px; flex: 1; overflow-y: auto; }
  .nav-label {
    padding: 20px 8px 6px; font-size: 11px; font-weight: 600;
    color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em;
  }
  .spec-nav {
    padding: 5px 8px; border-radius: 6px;
    font-size: 12px; color: var(--text-3); cursor: pointer;
    display: block; transition: all 0.1s; line-height: 1.4;
    margin-bottom: 1px;
  }
  .spec-nav:hover { background: var(--hover); color: var(--text-2); }
  .spec-nav.active { color: var(--accent); font-weight: 500; }
  .sidebar-footer {
    padding: 14px 16px; border-top: 1px solid var(--border-light);
    font-size: 12px; color: var(--text-2);
    display: flex; align-items: center; gap: 8px;
  }
  .avatar {
    width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600;
  }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    padding: 0 24px; height: 52px;
    display: flex; align-items: center;
    border-bottom: 1px solid var(--border-light);
    background: var(--surface); flex-shrink: 0;
  }
  .topbar h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
  .content { flex: 1; overflow-y: auto; display: flex; justify-content: center; }
  #doc {
    width: 100%; max-width: 720px; padding: 48px 40px 120px;
  }
  #doc h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px; }
  #doc h2 {
    font-size: 16px; font-weight: 600; letter-spacing: -0.01em;
    margin: 32px 0 12px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border-light);
  }
  #doc h3 { font-size: 14px; font-weight: 600; margin: 20px 0 8px; }
  #doc p { font-size: 14px; color: var(--text-2); line-height: 1.75; margin-bottom: 12px; }
  #doc strong { color: var(--text); font-weight: 600; }
  #doc em { font-style: italic; }
  #doc ul, #doc ol { padding-left: 24px; margin: 0 0 16px; color: var(--text-2); }
  #doc li { margin-bottom: 6px; line-height: 1.6; }
  #doc code {
    font-size: 12px; background: var(--inset); padding: 1px 5px;
    border-radius: 3px; font-family: ui-monospace, monospace;
  }
  #doc pre {
    background: var(--inset); padding: 14px 16px; border-radius: 8px;
    margin: 12px 0; overflow-x: auto; font-size: 13px;
    font-family: ui-monospace, monospace; line-height: 1.6; color: var(--text-2);
  }
  #doc pre code { background: none; padding: 0; font-size: inherit; }
  #doc blockquote {
    background: rgba(180,83,9,0.06); border-radius: 8px;
    padding: 14px 16px; margin: 16px 0;
  }
  #doc blockquote p { font-size: 13px; color: var(--text-2); line-height: 1.6; margin-bottom: 6px; }
  #doc blockquote p:last-child { margin-bottom: 0; }

  /* Checkbox styling via post-processing */
  .criterion {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 5px 0; font-size: 14px; color: var(--text-2); line-height: 1.6;
    list-style: none;
  }
  .check {
    width: 16px; height: 16px; border-radius: 4px;
    border: 1.5px solid var(--border); flex-shrink: 0; margin-top: 3px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .loading { padding: 48px; color: var(--text-3); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">W</div>
    <div class="logo-text">Workhorse</div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-label">v1 Specs</div>
    <div id="nav-list"></div>
  </div>
  <div class="sidebar-footer">
    <div class="avatar">E</div>
    Edwin M-F
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1>v1 Specs — Review</h1>
  </div>
  <div class="content">
    <div id="doc"><div class="loading">Loading specs...</div></div>
  </div>
</div>

<script>
const SPEC_FILES = [
  { file: 'v1-overview.md', label: 'Overview' },
  { file: 'WH-001-speculate.md', label: 'Spec interview' },
  { file: 'WH-016-feature-card.md', label: 'Feature card' },
  { file: 'WH-002-spec-editor.md', label: 'Spec editor' },
  { file: 'WH-005-commit-specs.md', label: 'Commit specs' },
  { file: 'WH-018-multi-spec-cards.md', label: 'Multi-spec cards' },
  { file: 'WH-019-card-dependencies.md', label: 'Card dependencies' },
  { file: 'WH-007-teams-features.md', label: 'Teams & features' },
  { file: 'WH-008-user-identity.md', label: 'User identity' },
  { file: 'WH-010-multi-repo.md', label: 'Multi-product' },
  { file: 'WH-006-spec-format.md', label: 'Spec format' },
  { file: 'WH-017-product-spec-browser.md', label: 'Product spec browser' },
  { file: 'WH-020-design-library.md', label: 'Design library' },
  { file: 'WH-003-visual-mockups.md', label: 'Visual mockups' },
  { file: 'WH-013-github-integration.md', label: 'GitHub integration' },
];

const navList = document.getElementById('nav-list');
const docEl = document.getElementById('doc');

// Build nav
SPEC_FILES.forEach((spec, i) => {
  const nav = document.createElement('div');
  nav.className = 'spec-nav' + (i === 0 ? ' active' : '');
  nav.textContent = spec.label;
  nav.addEventListener('click', () => loadSpec(spec.file, nav));
  navList.appendChild(nav);
});

async function loadSpec(file, navEl) {
  // Update nav active state
  document.querySelectorAll('.spec-nav').forEach(n => n.classList.remove('active'));
  if (navEl) navEl.classList.add('active');

  try {
    const res = await fetch('../specs/' + file);
    if (!res.ok) throw new Error('Not found');
    const md = await res.text();

    // Parse with marked
    let html = marked.parse(md);

    // Post-process: convert checkbox list items to styled criteria
    html = html.replace(
      /<li><input[^>]*type="checkbox"[^>]*disabled(?:="")?[^>]*>\s*/gi,
      '<li class="criterion"><span class="check"></span><span>'
    );
    // Close the span we opened
    html = html.replace(/<\/li>/g, (match, offset, str) => {
      // Check if this li had our criterion class
      const before = str.substring(Math.max(0, offset - 200), offset);
      if (before.includes('class="criterion"')) {
        return '</span></li>';
      }
      return match;
    });

    // Remove frontmatter (--- blocks at the top)
    html = html.replace(/^<hr>\n<h2>.*?<\/h2>\n<p>.*?<\/p>\n<hr>/s, '');

    docEl.innerHTML = html;
  } catch (e) {
    docEl.innerHTML = '<p style="color: var(--text-3);">Could not load ' + file + '. Make sure you\'re serving this from a web server (e.g. <code>npx serve</code> from the workhorse directory).</p>';
  }
}

// Load first spec
loadSpec(SPEC_FILES[0].file, document.querySelector('.spec-nav'));
</script>

</body>
</html>
