# Review Hero configuration
# https://github.com/beyondessential/review-hero

project: Workhorse
description: Spec-driven development workbench built with Next.js, Prisma, and Claude AI

ignore_patterns:
  - "prisma/migrations/**"
  - ".workhorse/specs/**"
  - ".workhorse/design/**"

agents:
  project-conventions:
    name: "Project Conventions"
    description: "Workhorse conventions — Australian/NZ English, design system, component patterns, Prisma schema"
  performance:
    name: "Performance & Responsiveness"
    description: "Snappy UI — no waterfall queries, missing loading states, redundant fetches, or blocking layout renders"
